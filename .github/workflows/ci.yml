name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Validate Compose And Scripts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install lint dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Prepare CI env and secrets
        run: |
          set -e
          cp srcs/.env.example srcs/.env
          sed -i 's|^WORDPRESS_URL=.*|WORDPRESS_URL=abdsalah.42.fr|' srcs/.env

          mkdir -p "$GITHUB_WORKSPACE/.ci-data/mariadb" "$GITHUB_WORKSPACE/.ci-data/wordpress"
          mkdir -p "$GITHUB_WORKSPACE/../secrets"

          printf '%s\n' 'rootpass_ci_123' > "$GITHUB_WORKSPACE/../secrets/db_root.txt"
          printf '%s\n' 'userpass_ci_123' > "$GITHUB_WORKSPACE/../secrets/db_user.txt"
          printf '%s\n' 'adminpass_ci_123' > "$GITHUB_WORKSPACE/../secrets/wp_admin.txt"
          printf '%s\n' 'authorpass_ci_123' > "$GITHUB_WORKSPACE/../secrets/wp_user.txt"
          printf '%s\n' 'portainerpass_ci_123' > "$GITHUB_WORKSPACE/../secrets/portainer_admin.txt"

      - name: Validate Docker Compose config
        env:
          CI_PROJECT_DIR: ${{ github.workspace }}
        run: |
          docker compose -f srcs/docker-compose.yml -f srcs/docker-compose.ci.yml config -q

      - name: Lint shell scripts
        run: |
          find srcs -type f -name '*.sh' -print0 | xargs -0 shellcheck -S warning

  integration:
    name: Build And Integration Test
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare CI env and secrets
        run: |
          set -e
          cp srcs/.env.example srcs/.env
          sed -i 's|^WORDPRESS_URL=.*|WORDPRESS_URL=abdsalah.42.fr|' srcs/.env

          mkdir -p "$GITHUB_WORKSPACE/.ci-data/mariadb" "$GITHUB_WORKSPACE/.ci-data/wordpress"
          mkdir -p "$GITHUB_WORKSPACE/../secrets"

          printf '%s\n' 'rootpass_ci_123' > "$GITHUB_WORKSPACE/../secrets/db_root.txt"
          printf '%s\n' 'userpass_ci_123' > "$GITHUB_WORKSPACE/../secrets/db_user.txt"
          printf '%s\n' 'adminpass_ci_123' > "$GITHUB_WORKSPACE/../secrets/wp_admin.txt"
          printf '%s\n' 'authorpass_ci_123' > "$GITHUB_WORKSPACE/../secrets/wp_user.txt"
          printf '%s\n' 'portainerpass_ci_123' > "$GITHUB_WORKSPACE/../secrets/portainer_admin.txt"

      - name: Build all images
        env:
          CI_PROJECT_DIR: ${{ github.workspace }}
        run: |
          docker compose -f srcs/docker-compose.yml -f srcs/docker-compose.ci.yml build --parallel

      - name: Start core services
        env:
          CI_PROJECT_DIR: ${{ github.workspace }}
        run: |
          docker compose -f srcs/docker-compose.yml -f srcs/docker-compose.ci.yml up -d mariadb redis wordpress nginx

      - name: Wait for service health
        env:
          CI_PROJECT_DIR: ${{ github.workspace }}
        run: |
          set -e
          services="mariadb redis wordpress nginx"

          for service in $services; do
            cid=$(docker compose -f srcs/docker-compose.yml -f srcs/docker-compose.ci.yml ps -q "$service")
            if [ -z "$cid" ]; then
              echo "Container for $service not found"
              exit 1
            fi

            echo "Waiting for $service ($cid) to become healthy..."
            for i in $(seq 1 80); do
              status=$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "$cid")
              if [ "$status" = "healthy" ] || [ "$status" = "running" ]; then
                echo "$service is $status"
                break
              fi
              if [ "$status" = "unhealthy" ] || [ "$status" = "exited" ] || [ "$status" = "dead" ]; then
                echo "$service failed with status: $status"
                exit 1
              fi
              if [ "$i" -eq 80 ]; then
                echo "Timeout while waiting for $service"
                exit 1
              fi
              sleep 3
            done
          done

      - name: Smoke test HTTPS endpoint
        run: |
          curl -skf --resolve abdsalah.42.fr:8443:127.0.0.1 https://abdsalah.42.fr:8443/wp-login.php | grep -Eiq 'wordpress|log in|login'

      - name: Verify TLS certificate subject
        run: |
          echo | openssl s_client -connect 127.0.0.1:8443 -servername abdsalah.42.fr 2>/dev/null \
            | openssl x509 -noout -subject \
            | grep -q 'CN = abdsalah.42.fr'

      - name: Verify WordPress installation and Redis connectivity
        env:
          CI_PROJECT_DIR: ${{ github.workspace }}
        run: |
          docker compose -f srcs/docker-compose.yml -f srcs/docker-compose.ci.yml exec -T wordpress wp core is-installed --allow-root
          docker compose -f srcs/docker-compose.yml -f srcs/docker-compose.ci.yml exec -T redis redis-cli ping | grep -q PONG

      - name: Verify MariaDB database exists
        env:
          CI_PROJECT_DIR: ${{ github.workspace }}
        run: |
          docker compose -f srcs/docker-compose.yml -f srcs/docker-compose.ci.yml exec -T mariadb \
            sh -lc 'mysql -uroot -p"$(cat /run/secrets/mysql_root_password)" -e "SHOW DATABASES;" | grep -q "$MYSQL_DATABASE"'

      - name: Dump container status and logs on failure
        if: failure()
        env:
          CI_PROJECT_DIR: ${{ github.workspace }}
        run: |
          docker compose -f srcs/docker-compose.yml -f srcs/docker-compose.ci.yml ps
          docker compose -f srcs/docker-compose.yml -f srcs/docker-compose.ci.yml logs --no-color --tail=200

      - name: Teardown
        if: always()
        env:
          CI_PROJECT_DIR: ${{ github.workspace }}
        run: |
          docker compose -f srcs/docker-compose.yml -f srcs/docker-compose.ci.yml down -v --remove-orphans

  bonus_integration:
    name: Bonus Services Integration Test
    runs-on: ubuntu-latest
    needs: integration

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare CI env and secrets
        run: |
          set -e
          cp srcs/.env.example srcs/.env
          sed -i 's|^WORDPRESS_URL=.*|WORDPRESS_URL=abdsalah.42.fr|' srcs/.env

          mkdir -p "$GITHUB_WORKSPACE/.ci-data/mariadb" "$GITHUB_WORKSPACE/.ci-data/wordpress"
          mkdir -p "$GITHUB_WORKSPACE/../secrets"

          printf '%s\n' 'rootpass_ci_123' > "$GITHUB_WORKSPACE/../secrets/db_root.txt"
          printf '%s\n' 'userpass_ci_123' > "$GITHUB_WORKSPACE/../secrets/db_user.txt"
          printf '%s\n' 'adminpass_ci_123' > "$GITHUB_WORKSPACE/../secrets/wp_admin.txt"
          printf '%s\n' 'authorpass_ci_123' > "$GITHUB_WORKSPACE/../secrets/wp_user.txt"
          printf '%s\n' 'portainerpass_ci_123' > "$GITHUB_WORKSPACE/../secrets/portainer_admin.txt"

      - name: Build all images
        env:
          CI_PROJECT_DIR: ${{ github.workspace }}
        run: |
          docker compose -f srcs/docker-compose.yml -f srcs/docker-compose.ci.yml build --parallel

      - name: Start core and bonus services
        env:
          CI_PROJECT_DIR: ${{ github.workspace }}
        run: |
          docker compose -f srcs/docker-compose.yml -f srcs/docker-compose.ci.yml up -d mariadb redis wordpress nginx adminer static_site portainer

      - name: Wait for health on services with healthchecks
        env:
          CI_PROJECT_DIR: ${{ github.workspace }}
        run: |
          set -e
          services="mariadb redis wordpress nginx static_site"

          for service in $services; do
            cid=$(docker compose -f srcs/docker-compose.yml -f srcs/docker-compose.ci.yml ps -q "$service")
            if [ -z "$cid" ]; then
              echo "Container for $service not found"
              exit 1
            fi

            echo "Waiting for $service ($cid) to become healthy..."
            for i in $(seq 1 80); do
              status=$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "$cid")
              if [ "$status" = "healthy" ] || [ "$status" = "running" ]; then
                echo "$service is $status"
                break
              fi
              if [ "$status" = "unhealthy" ] || [ "$status" = "exited" ] || [ "$status" = "dead" ]; then
                echo "$service failed with status: $status"
                exit 1
              fi
              if [ "$i" -eq 80 ]; then
                echo "Timeout while waiting for $service"
                exit 1
              fi
              sleep 3
            done
          done

      - name: Wait for Adminer endpoint via Nginx
        run: |
          set -e
          for i in $(seq 1 40); do
            if curl -skf --resolve abdsalah.42.fr:8443:127.0.0.1 https://abdsalah.42.fr:8443/adminer >/dev/null; then
              echo "Adminer route is reachable"
              exit 0
            fi
            sleep 3
          done
          echo "Adminer route did not become reachable"
          exit 1

      - name: Verify static route via Nginx
        run: |
          curl -skf --resolve abdsalah.42.fr:8443:127.0.0.1 https://abdsalah.42.fr:8443/static | grep -q '42 Inception Project'

      - name: Verify Portainer endpoint
        run: |
          set -e
          for i in $(seq 1 40); do
            code=$(curl -sk -o /dev/null -w '%{http_code}' https://127.0.0.1:9443 || true)
            if [ "$code" = "200" ] || [ "$code" = "302" ] || [ "$code" = "401" ]; then
              echo "Portainer endpoint reachable with HTTP $code"
              exit 0
            fi
            sleep 3
          done
          echo "Portainer endpoint did not become reachable"
          exit 1

      - name: Dump container status and logs on failure
        if: failure()
        env:
          CI_PROJECT_DIR: ${{ github.workspace }}
        run: |
          docker compose -f srcs/docker-compose.yml -f srcs/docker-compose.ci.yml ps
          docker compose -f srcs/docker-compose.yml -f srcs/docker-compose.ci.yml logs --no-color --tail=200

      - name: Teardown
        if: always()
        env:
          CI_PROJECT_DIR: ${{ github.workspace }}
        run: |
          docker compose -f srcs/docker-compose.yml -f srcs/docker-compose.ci.yml down -v --remove-orphans
